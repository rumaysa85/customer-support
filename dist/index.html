<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS — Ticket System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .kpi {
        position: relative;
        overflow: hidden;
        color: #fff;
      }
      .kpi::after {
        /* subtle white lines like the Figma cards */
        content: "";
        position: absolute;
        inset: 0;
        opacity: .25;
        background:
          repeating-linear-gradient( 60deg, rgba(255,255,255,.28) 0 2px, transparent 2px 14px);
        pointer-events: none;
      }
      .toast{animation:fade .25s ease}
      @keyframes fade{from{opacity:0; transform:translateY(-6px)} to{opacity:1; transform:translateY(0)}}
    </style>
    <script type="module" crossorigin src="/assets/index-DTVVdwh6.js"></script>
  </head>
  <body class="bg-white text-slate-900">
    <div id="root"></div>
    <div id="toasts" class="fixed top-4 right-4 space-y-2 z-50"></div>
  </body>
</html>
